# Render the full chezmoi state for every machine shape the repo claims to
# support, so template errors that only bite on a shape we don't own (e.g. a
# headless box without 1Password) fail here instead of on a fresh machine.
#
# Lives at the repo root, outside chezmoi's view (.chezmoiroot = home/), so it
# is never applied to a machine.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Monthly: PR runs skip externals (--exclude below), so the pinned URLs +
    # sha256 checksums in .chezmoiexternal.toml.tmpl are otherwise exercised
    # only by a fresh machine. This catches URL rot / upstream re-tagging as a
    # CI failure instead. Job names are unchanged, so the ruleset's required
    # checks are unaffected.
    - cron: "17 9 3 * *"

# Everything here only reads the repo; say so explicitly rather than inheriting
# the repo-default token permissions.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS ${{ matrix.profile }} ${{ matrix.headless == 'true' && 'headless' || 'headed' }}${{ matrix.ephemeral == 'true' && ' ephemeral' || '' }}
    # Pinned rather than macos-latest: deterministic renders, and the -latest
    # label emits migration notices whenever GitHub moves it (e.g. to macOS 26).
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        profile: [personal, work]
        headless: ["true", "false"]
        ephemeral: ["false"]
        include:
          # One ephemeral shape so the {{ if .ephemeral }} package blocks don't
          # ship unlinted on macOS. NOT in the ruleset's required checks (the
          # six required job names are unchanged); add it there to make it gate.
          - profile: personal
            headless: "false"
            ephemeral: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install chezmoi and shellcheck
        # The runner image ships taps we don't use; untrusted ones make every
        # brew call emit a tap-trust warning, so drop them first.
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install chezmoi shellcheck

      # Headed shapes render onepasswordRead (git signing key, AWS SSO). CI has
      # no 1Password account, so stub the CLI: rendering is what's under test,
      # not the secrets' values. chezmoi's account mode runs `op signin --raw`
      # before reading, and the AWS SSO "accounts" field must parse as JSON, so
      # those two get shaped responses. The stub also satisfies the op check in
      # the .install-homebrew.sh read-source-state hook.
      - name: Stub the 1Password CLI
        run: |
          mkdir -p "$HOME/stub-bin"
          cat > "$HOME/stub-bin/op" <<'EOF'
          #!/bin/sh
          # `read` matched mid-string: chezmoi puts global flags first, as in
          # `op --session <token> read --no-newline op://...`.
          case " $* " in
            *" signin "*) echo "ci-stub-session-token" ;;
            *" account list "*) echo "ci-stub-account" ;;
            *"AWS SSO/accounts"*) echo '[{"name": "ci-stub", "account_id": "123456789012", "role": "ci-stub-role"}]' ;;
            *" read "*) echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5CIStubNotARealKey ci-stub" ;;
            *) echo "op stub: unhandled invocation: $*" >&2; exit 1 ;;
          esac
          EOF
          chmod +x "$HOME/stub-bin/op"
          echo "$HOME/stub-bin" >> "$GITHUB_PATH"

      # Run the real `chezmoi init` prompt path. The config template forces
      # ephemeral+headless when stdin is not a TTY (see CLAUDE.md), so run it
      # under a PTY to make the --promptBool flags take effect.
      - name: chezmoi init (config template, under a PTY)
        env:
          PROFILE: ${{ matrix.profile }}
          HEADLESS: ${{ matrix.headless }}
          EPHEMERAL: ${{ matrix.ephemeral }}
        run: |
          python3 - <<'EOF'
          import os, pty, sys
          sys.exit(pty.spawn([
              "chezmoi", "init", "--source", os.environ["GITHUB_WORKSPACE"],
              "--promptString", "Full name=CI Test",
              "--promptString", "Email address=ci@example.invalid",
              "--promptString", "AWS default region=us-east-1",
              "--promptChoice", "Machine profile=" + os.environ["PROFILE"],
              "--promptBool", "headless=" + os.environ["HEADLESS"],
              "--promptBool", "ephemeral=" + os.environ["EPHEMERAL"],
          ]))
          EOF

      - name: Assert the init prompts landed
        env:
          PROFILE: ${{ matrix.profile }}
          HEADLESS: ${{ matrix.headless }}
          EPHEMERAL: ${{ matrix.ephemeral }}
        run: |
          chezmoi --source "$GITHUB_WORKSPACE" data |
            jq -e --arg p "$PROFILE" --arg h "$HEADLESS" --arg e "$EPHEMERAL" \
              '.profile == $p and (.headless | tostring) == $h and (.ephemeral | tostring) == $e' >/dev/null

      # Renders every managed file (including modify_ templates) without
      # touching the runner. Externals are excluded on push/PR (plain downloads;
      # skipping keeps those runs fast and network-flake-free) but exercised on
      # the monthly scheduled run so the pinned URLs + checksums stay verified.
      - name: chezmoi apply --dry-run
        # The authorized_keys template calls gitHubKeys (GitHub API);
        # authenticate so shared-runner rate limits can't flake the render.
        # Scoped to this step only — the render is the sole API consumer.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: chezmoi --source "$GITHUB_WORKSPACE" apply --dry-run ${{ github.event_name == 'schedule' && '' || '--exclude externals' }}

      # Render each setup script with this shape's data and lint it. Scripts
      # gated off for the shape render as whitespace-only and are skipped.
      - name: Render setup scripts and shellcheck
        run: |
          set -eu
          out="$(mktemp -d)"
          for f in home/.chezmoiscripts/darwin/*.sh.tmpl; do
            name="$(basename "$f" .tmpl)"
            chezmoi --source "$GITHUB_WORKSPACE" execute-template < "$f" > "$out/$name"
            if grep -q '[^[:space:]]' "$out/$name"; then
              echo "shellcheck: $name"
              shellcheck "$out/$name"
            else
              echo "skip (gated off for this shape): $name"
            fi
          done
          shellcheck home/.install-homebrew.sh

  # Server-side backstop for the prek-managed git hooks (.pre-commit-config.yaml):
  # covers commits made with --no-verify, GitHub-UI edits, and machines where
  # the hooks weren't installed.
  hooks:
    name: prek hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # gitleaks/actionlint are language: golang hooks that prek builds with a
      # managed toolchain; cache the built environments across runs.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # Hash-pinned from PyPI (wheel hashes only, so pip can never fall back
      # to building an unpinned sdist). Dependabot bumps the pin+hashes.
      - name: Install prek
        run: |
          python3 -m pip install --user --require-hashes --no-deps \
            -r .github/requirements.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run hooks on all files
        run: prek run --all-files --show-diff-on-failure

  # The other machine class: non-interactive provisioning on Linux (the
  # Codespaces/container path). No PTY, so the config template must
  # auto-detect ephemeral+headless; no op stub, because headless shapes must
  # render without 1Password at all — that is the regression this job guards.
  linux-ephemeral:
    name: Linux ephemeral (non-interactive)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pinned two ways: the install script is fetched at a tagged ref and
      # checksum-verified before it runs, and it installs a pinned chezmoi
      # release (the script verifies the binary against the release's
      # checksums.txt itself). Bump tag + sha256 together.
      - name: Install chezmoi
        run: |
          curl -fsSL -o /tmp/chezmoi-install.sh \
            https://raw.githubusercontent.com/twpayne/chezmoi/v2.71.0/assets/scripts/install.sh
          echo "f9f83cce19397e1a2dedbc382e4e9db843c605e130e1eeabf42406c5520c5f9a  /tmp/chezmoi-install.sh" | sha256sum -c -
          sh /tmp/chezmoi-install.sh -b "$HOME/.local/bin" -t v2.71.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: chezmoi init (no TTY)
        run: |
          chezmoi init --source "$GITHUB_WORKSPACE" \
            --promptString "Full name=CI Test" \
            --promptString "Email address=ci@example.invalid" \
            --promptString "AWS default region=us-east-1" \
            --promptChoice "Machine profile=personal"

      - name: Assert ephemeral+headless were auto-detected
        run: |
          chezmoi --source "$GITHUB_WORKSPACE" data |
            jq -e '.ephemeral == true and .headless == true' >/dev/null

      - name: chezmoi apply --dry-run
        # personal profile → authorized_keys renders here too; authenticate the
        # gitHubKeys API call, scoped to this step only. Externals run on the
        # monthly schedule only, as in the macOS jobs.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: chezmoi --source "$GITHUB_WORKSPACE" apply --dry-run ${{ github.event_name == 'schedule' && '' || '--exclude externals' }}
