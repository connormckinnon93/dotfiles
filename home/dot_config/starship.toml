# Layout from the catppuccin-powerline preset; colors come from the terminal
# ANSI palette (driven by tinty) via the `tinty` palette below, so the prompt
# follows `tinty apply <scheme>`.
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](red)\
$os\
$username\
[Ņé░](bg:peach fg:red)\
$directory\
[Ņé░](bg:yellow fg:peach)\
$git_branch\
$git_status\
[Ņé░](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](fg:green bg:sapphire)\
$aws\
$conda\
[Ņé░](fg:sapphire bg:lavender)\
$time\
[Ņé┤ ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

palette = 'tinty'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = "Ņ£Å"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
AOSC = "’īü"
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[bun]
symbol = "ŅØ»"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "Ņś× "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "Ņśł"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "Ņē¢ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "Ņśå"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[aws]
symbol = "Ņ×Ł "
style = "bg:sapphire"
format = '[[ $symbol($profile )(\($region\) )](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " ’äī "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ ’É║ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:green)'
error_symbol = '[ŌØ»](bold fg:red)'
vimcmd_symbol = '[ŌØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "Ņ½┤ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = false
min_time_to_notify = 45000


# ANSI names so the prompt tracks the active tinty/base24 scheme.
[palettes.tinty]
red = "red"
peach = "bright-red"
yellow = "yellow"
green = "green"
sapphire = "cyan"
lavender = "purple"
crust = "black"
