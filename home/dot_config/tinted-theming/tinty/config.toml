# tinty - base16/base24 theme manager.
# Docs: https://github.com/tinted-theming/tinty
# Switch themes anytime: `tinty apply <scheme>` (browse with `tinty gallery`).

shell = "zsh -c '{}'"
default-scheme = "base24-catppuccin-mocha"

# Set the terminal's ANSI palette to the scheme. Everything ANSI-aware
# (fzf, eza, fast-syntax-highlighting, ls) then follows automatically.
[[items]]
name = "tinted-shell"
path = "https://github.com/tinted-theming/tinted-shell"
themes-dir = "scripts"
hook = "source \"$TINTY_THEME_FILE_PATH\""
supported-systems = ["base16", "base24"]
