# mise global config. Docs: https://mise.jdx.dev/
# These are the default global runtimes; a project's .mise.toml / .tool-versions
# overrides them inside that directory. Add more with `mise use -g go@latest`
# (which edits this file) or by hand, e.g. go = "latest", rust = "latest".
[tools]
node = "24.17"    # current LTS line
python = "3.13"
pnpm = "11.8"     # fast Node package manager
uv = "0.11"       # fast Python package/project manager (complements mise's python)

# CLI tools delivered through a language runtime (kept here so `mise install`
# provisions them too). mmdc renders Mermaid diagrams for nvim's Snacks.image.
"npm:@mermaid-js/mermaid-cli" = "11.15"
# ccstatusline: Claude Code status line. Wired in via ~/.claude/settings.json
# (statusLine.command -> this tool's mise shim); configured in
# ~/.config/ccstatusline/settings.json.
"npm:ccstatusline" = "2.2"

[settings]
# Also honor .nvmrc / .node-version files in projects that ship them.
idiomatic_version_file_enable_tools = ["node"]
