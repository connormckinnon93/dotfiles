# yazi - terminal file manager. Docs: https://yazi-rs.github.io/
# Theming: none needed. yazi's default theme uses ANSI color names for all its
# chrome, so it follows the tinty/base24 terminal palette automatically (only
# the [icon] glyph colors are fixed). Preview deps (ffmpeg, poppler, resvg,
# imagemagick, 7zip) are installed via the brew bundle.
[mgr]
show_hidden    = true
sort_by        = "natural"
sort_dir_first = true
linemode       = "size"
