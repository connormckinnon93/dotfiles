# lazygit - terminal UI for git. Docs: https://github.com/jesseduffield/lazygit
# Read from ~/.config/lazygit because XDG_CONFIG_HOME is set (see .zshenv);
# lazygit would otherwise default to ~/Library/Application Support on macOS.
gui:
  # We ship JetBrainsMono Nerd Font, so use its richer glyph set.
  nerdFontsVersion: "3"
  # Catppuccin Mocha (mauve accent), vendored from catppuccin/lazygit.
  theme:
    activeBorderColor:
      - "#cba6f7"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    searchingActiveBorderColor:
      - "#f9e2af"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    inactiveViewSelectedLineBgColor:
      - "#6c7086"
    cherryPickedCommitFgColor:
      - "#cba6f7"
    cherryPickedCommitBgColor:
      - "#45475a"
    markedBaseCommitFgColor:
      - "#89b4fa"
    markedBaseCommitBgColor:
      - "#f9e2af"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
  authorColors:
    "*": "#b4befe"
git:
  paging:
    # Reuse the same Catppuccin Mocha delta pager configured for git.
    colorArg: always
    pager: delta --paging=never
